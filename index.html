<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인공지능 자세 판결기</title>
    <style>
        /* 깔끔하고 모던한 배경 및 폰트 설정 */
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 전체 콘텐츠를 감싸는 카드 컨테이너 */
        .container {
            max-width: 450px;
            width: 100%;
            background: #ffffff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        /* 메인 제목 */
        h1 {
            font-size: 24px;
            color: #1e293b;
            margin-bottom: 25px;
        }

        /* 버튼 스타일 */
        button {
            background-color: #4f46e5;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
            margin-bottom: 25px;
        }

        button:hover {
            background-color: #4338ca;
            transform: translateY(-2px);
        }

        /* 웹캠이 들어갈 상자 */
        #webcam-container {
            margin: 0 auto 25px auto;
            border-radius: 15px;
            overflow: hidden;
            width: 200px;
            height: 200px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            background-color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 결과 글자 상자 스타일 */
        #label-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* 스크립트에 의해 동적으로 생성될 내부 div들의 스타일 */
        #label-container div {
            background: #f8fafc;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            font-size: 16px;
            font-weight: bold;
            color: #475569;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>인공지능 자세 판결기</h1>

        <button type="button" onclick="init()">Start</button>
        <div id="webcam-container"></div>
        <div id="label-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script type="text/javascript">

        const URL = "https://teachablemachine.withgoogle.com/models/qgXC6eWGS/";

        let model, webcam, labelContainer, maxPredictions;

        //1. 버트는 누르면 init()실행
        async function init() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

        
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            
            const flip = true; 
            webcam = new tmImage.Webcam(200, 200, flip); 
            await webcam.setup(); 
            await webcam.play();

            // 2. loop함수 동작을 예약하는 코드(화면이 갱신된 후 loop함수 실행)
            window.requestAnimationFrame(loop);

            //3. 버튼을 클릭 했을떄 동적으로 div 상자를 추가함
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
            for (let i = 0; i < maxPredictions; i++) { // and class labels
                labelContainer.appendChild(document.createElement("div"));
            }
        }

        async function loop() {
            webcam.update(); // update the webcam frame

            // 5. predict 함수가 호출됨
            await predict();
            //7. loop 함수 안에서 또다른 loop 함수를 호출예약하면서
            //브라우저를 끄기 전까지 계쏙 무한루프 반복함
            window.requestAnimationFrame(loop);
        }

        
        async function predict() {
            //6. 모델이 웹캠의 화면을 예측하는 중요한 동작을 수행
            const prediction = await model.predict(webcam.canvas);
            for (let i = 0; i < maxPredictions; i++) {
                const classPrediction =
                    prediction[i].className + ": " + prediction[i].probability.toFixed(2);
                labelContainer.childNodes[i].innerHTML = classPrediction;
            }
        }
    </script>
</body>
</html>
